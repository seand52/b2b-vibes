services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: b2b
      POSTGRES_PASSWORD: b2b_secret
      POSTGRES_DB: b2b_orders
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U b2b -d b2b_orders"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
